name: flutter_project_template_workspace
publish_to: none

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

workspace:
  - apps/client_app
  - apps/admin_app
  - modules/core
  - modules/design_system
  - modules/admin_users
  - modules/admin_auth
  - modules/client_auth
  - modules/client_preferences
  - modules/client_shell

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  config:
    enable-swift-package-manager: true
