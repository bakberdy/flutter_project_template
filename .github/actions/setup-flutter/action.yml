name: Set up Flutter
description: Set up the repository Flutter SDK, caches, and dependencies.

runs:
  using: composite
  steps:
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version-file: .fvmrc
        cache: true
        pub-cache: true

    - name: Resolve dependencies
      shell: bash
      run: |
        flutter pub get
        dart pub get --directory packages/project_lints
