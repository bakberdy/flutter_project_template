name: Project Validation
on:
  workflow_call:

  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: project-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: ./.github/actions/setup-flutter

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

  analyze:
    name: Analyze Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: ./.github/actions/setup-flutter

      - name: Analyze workspace
        run: dart analyze

  tests:
    name: Changed Package Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: ./.github/actions/setup-flutter

      - name: Run tests for changed packages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          dart run tool/validation/run_changed_tests.dart \
            --base "${BASE_SHA}"

  hardcoded-texts:
    name: Hardcoded Texts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: ./.github/actions/setup-flutter

      - name: Validate hardcoded text
        run: dart run tool/validation/check_hardcoded_ui_strings.dart

  security:
    name: Sensitive Data & Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="${RUNNER_TEMP}/gitleaks.tar.gz"
          curl --fail --silent --show-error --location --retry 3 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check --status
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}" gitleaks

      - name: Scan repository for secrets
        run: >
          "${RUNNER_TEMP}/gitleaks" git
          --redact
          --no-banner
          --verbose
          .

  diff-check:
    name: Diff Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check whitespace errors
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [[ -n "${BASE_SHA}" ]]; then
            git diff --check "${BASE_SHA}...HEAD"
          else
            git show --check --format= HEAD
          fi
