targets:
  $default:
    builders:
      json_serializable:
        options:
          field_rename: snake

      freezed:
        generate_for:
          - lib/src/features/**/domain/entities/**.dart
          - lib/src/features/**/presentation/bloc/**.dart
          - lib/src/features/**/presentation/blocs/**.dart
        options:
          to_json: false
          from_json: false
          when: false
          map: false

      injectable_generator:injectable_builder:
        options:
          auto_register: true
          generate_for_injectable: true

      auto_route_generator:auto_route_generator:
        generate_for:
          - lib/src/features/**/presentation/screens/**.dart

      auto_route_generator:auto_router_generator:
        generate_for:
          - lib/src/common/config/router/client_profile_router.dart
