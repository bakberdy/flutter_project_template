name: client_auth
description: Client authentication module.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  auto_route: ^11.1.0
  bloc_concurrency: ^0.3.0
  cached_network_image: ^3.4.1
  core:
    path: ../core
  design_system:
    path: ../design_system
  dartz: ^0.10.1
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  flutter_slidable: ^4.0.3
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  injectable: ^3.0.0
  intl: ^0.20.2
  json_annotation: ^4.12.0

dev_dependencies:
  auto_route_generator: ^10.5.0
  build_runner: ^2.13.0
  flutter_gen_runner: ^5.13.0+1
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  injectable_generator: ^3.0.2
  index_generator: ^4.1.2
  json_serializable: ^6.13.0

index_generator:
  exclude:
    - "**.freezed.dart"
    - "**.g.dart"
    - "**.gr.dart"
    - "src/common/auth_api_endpoints.dart"
    - "src/features/**/presentation/**/*_event.dart"
    - "src/features/**/presentation/**/*_state.dart"
  libraries:
    - directory_path: lib
      include:
        - gen/**.dart
        - src/common/**.dart
        - src/common/config/di/**.dart
        - src/features/**/configs/**.dart
        - src/features/**/data/**.dart
        - src/features/**/domain/**.dart
        - src/features/**/presentation/**.dart
        - src/common/config/router/**.dart

flutter:
  generate: true
  assets:
    - assets/

flutter_gen:
  assets:
    outputs:
      package_parameter_enabled: true
