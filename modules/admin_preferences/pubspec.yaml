name: admin_preferences
description: Admin user preferences module.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

  core:
    path: ../core
  design_system:
    path: ../design_system
  shared:
    path: ../shared
  dartz: ^0.10.1
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  injectable: ^3.0.0
  intl: ^0.20.2
  json_annotation: ^4.12.0

dev_dependencies:
  build_runner: ^2.13.0
  flutter_gen_runner: ^5.13.0+1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  injectable_generator: ^3.0.2
  json_serializable: ^6.13.0

flutter:
  generate: true
  assets:
    - assets/admin_preferences/

flutter_gen:
  assets:
    outputs:
      package_parameter_enabled: true
