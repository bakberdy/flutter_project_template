name: design_system
description: Shared design system package for the Flutter template.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  build_runner: ^2.13.0
  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.13.0+1
  index_generator: ^4.1.2

index_generator:
  exclude:
    - "**.g.dart"
  libraries:
    - directory_path: lib
      include:
        - gen/**.dart
        - src/**.dart

flutter:
  generate: true
  assets:
    - assets/icons/general/
    - assets/icons/country_flags/
    - assets/launcher_icon/

  fonts:
    - family: Hiatus
      fonts:
        - asset: assets/fonts/Hiatus.ttf

    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat/Montserrat-VariableFont_wght.ttf
          weight: 400

flutter_gen:
  assets:
    outputs:
      package_parameter_enabled: true
  fonts:
    outputs:
      package_parameter_enabled: true
