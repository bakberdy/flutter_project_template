targets:
  $default:
    builders:
      source_gen:combining_builder:
        options:
          ignore_for_file:
            - unnecessary_null_checks
            - document_ignores

      json_serializable:
        options:
          field_rename: snake

      freezed:
        options:
          to_json: false
          from_json: false
          when: false
          map: false

      injectable_generator:injectable_builder:
        options:
          auto_register: true
          generate_for_injectable: true

      index_generator:
        enabled: true
